{% extends "base.html" %}

{% block content %}
<h2>Login</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.non_field_errors }}

    <div>
        <label>Username</label>
        {{ form.username }}
    </div>

    <div>
        <label>Password</label>
        {{ form.password }}
    </div>

    <button type="submit">Login</button>
</form>

{% endblock %}
